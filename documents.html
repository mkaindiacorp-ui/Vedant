<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Work Profile</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}
.file{
    background:#fff;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}
a{
    text-decoration:none;
    color:#000;
    font-weight:bold;
}
.premium-item{
    background: linear-gradient(135deg,#111,#222);
    color:#fff;
    border:1px solid rgba(212,175,55,.4);
    border-radius:14px;
    padding:16px 18px;
    margin:12px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:all .35s ease;
    overflow:hidden;
    position:relative;
}

.premium-item::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.15),
        transparent
    );
    transition:.8s;
}

.premium-item:hover::before{
    left:100%;
}

.premium-item:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 30px rgba(212,175,55,.25);
    border-color:gold;
}

.item-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.icon-box{
    width:42px;
    height:42px;
    border-radius:12px;
    background:linear-gradient(135deg,#d4af37,#f7e27b);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#000;
    font-size:18px;
}

.arrow{
    color:gold;
    transition:.3s;
}

.premium-item:hover .arrow{
    transform:translateX(6px);
}
</style>
</head>
<body>

<h2>My Documents</h2>

<div class="file">
    <a href="TC.PDF">📜 Certificate</a>
</div>

<div class="file">
    <a href="WhatsApp Image 2026-06-11 at 3.53.29 P.jpge" target="_blank">📘 Cast Certificate</a>
</div>
<div class="file">
    <a href="AADHAR.pdf">📘 Adhar Card </a>
</div>
</body>
</html>
